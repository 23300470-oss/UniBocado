<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-Bocado - Registrarse</title>
    <!-- ¡AGREGADO: Librería de SweetAlert2 para que funcionen las alertas! -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #D7D2C8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .wrapper {
            width: 360px;
            min-height: 640px;
            height: auto;
            background-color: #F5F2EB;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: 20px 20px 80px 20px;
            box-sizing: border-box;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #6F4E37;
            font-weight: bold;
            z-index: 10;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 15px;
            margin-left: 40px;
        }

        .logo-img {
            width: 94%;
            height: auto;
        }

        /* Cambiado a form para que el estilo aplique directo a la etiqueta */
        .form-container {
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 5;
        }

        label {
            color: #000000;
            font-family: 'Georgia', serif;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .input-box {
            width: 100%;
            padding: 10px 12px;
            background-color: #84593C;
            border: 2px solid #553A26;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            color: #FFFFFF;
            margin-bottom: 12px;
            outline: none;
            box-shadow: inset 0 0 0 2px #F5F2EB;
        }

        .btn-submit {
            width: 65%;
            padding: 11px 0;
            background-color: #6F4E37;
            color: white;
            border: 2px solid #553A26;
            border-radius: 4px;
            font-size: 17px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            align-self: center;
            box-shadow: inset 0 0 0 2px #F5F2EB;
            margin-top: 15px;
            z-index: 10;
        }

        .mascota-container {
            position: absolute;
            bottom: -20px;
            right: 5px;
            width: 125px;
            z-index: 99;
            pointer-events: none;
        }

        .mascota-img {
            width: 140%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
      
        <div class="logo-container">
            <img src="logo_completo.png" alt="Uni-Bocado Logo" class="logo-img">
        </div>

        <!-- ¡CORREGIDO: Ahora es una etiqueta <form> con el id correspondiente! -->
        <form class="form-container" id="registroForm">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" class="input-box" required>

            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" class="input-box" required>

            <label for="correo">Correo</label>
            <!-- Cambiado temporalmente a type="text" para que actúe nuestro validador invisible -->
            <input type="text" id="correo" class="input-box" required placeholder="usuario@correo.com">

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" class="input-box" required>

            <label for="confirmarContrasena">Confirmar contraseña</label>
            <input type="password" id="confirmarContrasena" class="input-box" required>
          
            <button type="submit" class="btn-submit">Registrarse</button>
        </form>
        
        <div class="mascota-container">
            <img src="ratoncito.png" alt="Ratoncito Chef" class="mascota-img">
        </div>
    </div>

<script>
    document.getElementById('registroForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const nombre = document.getElementById('nombre').value.trim();
        const apellidos = document.getElementById('apellidos').value.trim();
        const correo = document.getElementById('correo').value.trim();
        const contrasena = document.getElementById('contrasena').value;
        const confirmarContrasena = document.getElementById('confirmarContrasena').value;

        // --- VALIDACIÓN DE CORREO ---
        const validadorInvisible = document.createElement('input');
        validadorInvisible.type = 'email';
        validadorInvisible.value = correo;

        if (!validadorInvisible.checkValidity() || !correo.includes('.')) {
            Swal.fire({
                icon: 'warning',
                title: 'Correo inválido',
                text: 'Por favor, escribe un formato de correo real (ejemplo: usuario@correo.com).',
                width: '300px',
                confirmButtonColor: '#8B5A2B',
                customClass: { popup: 'alerta-celular' }
            });
            return;
        }

        // Validación de contraseñas idénticas
        if (contrasena !== confirmarContrasena) {
            Swal.fire({
                icon: 'error',
                title: '¡Oops!',
                text: 'Las contraseñas no coinciden.',
                width: '300px',
                confirmButtonColor: '#8B5A2B',
                customClass: { popup: 'alerta-celular' }
            });
            return;
        }

        const datosUsuario = {
            nombre: nombre,
            apellidos: apellidos,
            correo: correo,
            contrasena: contrasena
        };

        // Cambiado a ruta relativa para evitar problemas en las computadoras de tu equipo
        fetch('/api/registrar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datosUsuario)
        })
        .then(response => {
            return response.json().then(data => {
                if (!response.ok) {
                    throw new Error(data.error || 'Hubo un problema.');
                }
                return data;
            });
        })
        .then(data => {
            Swal.fire({
                icon: 'success',
                title: '¡Registro exitoso! 🎉',
                text: 'Ya formas parte de Uni-Bocado',
                width: '300px',
                showConfirmButton: false,
                timer: 2000,
                timerProgressBar: true,
                customClass: { popup: 'alerta-celular' }
            }).then(() => {
                // Redirige al login para iniciar sesión una vez registrado
                window.location.href = 'login.html';
            });
        })
        .catch(error => {
            Swal.fire({
                icon: 'warning',
                title: 'Atención',
                text: error.message,
                width: '300px',
                confirmButtonColor: '#8B5A2B',
                customClass: { popup: 'alerta-celular' }
            });
        });
    });
</script>

</body>
</html>
